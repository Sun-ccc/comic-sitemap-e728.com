name: IndexNow 自动推送

on:
  push:
    branches:
      - master
    paths:
      - increment_urls.json
  workflow_dispatch:

jobs:
  push_task:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取文件
        uses: actions/checkout@v4

      - name: 推送给必应
        run: |
          URL_CONTENT=$(cat increment_urls.json)
          # 仅填写纯域名，不要带 https://
          HOST="www.e728.com"
          # 填写你的 IndexNow 密钥
          KEY="e40b2ca8323040d19ad6f2023e5e1d70"

          echo "=== 推送参数检查 ==="
          echo "Host: $HOST"
          echo "URL 数量: $(echo $URL_CONTENT | jq length)"
          echo "===================="

          RESULT=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"$HOST\",
              \"key\": \"$KEY\",
              \"urlList\": $URL_CONTENT
            }")

          echo "=== 推送结果 ==="
          echo "$RESULT"
